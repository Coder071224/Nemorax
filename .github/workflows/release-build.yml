name: Release Builds

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flet

      - name: Build Windows app
        env:
          PYTHONPATH: src
          FLET_CLI_NO_RICH_OUTPUT: "1"
        run: flet build windows --module app.py --output dist/windows --yes --no-rich-output

      - name: Collect Windows executable
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path dist/windows -Recurse -Filter *.exe | Select-Object -First 1
          if (-not $exe) { throw "No Windows executable was produced." }
          Copy-Item $exe.FullName dist/Nemorax.exe -Force

      - name: Upload Windows release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Nemorax.exe

      - name: Upload Windows artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: Nemorax-windows
          path: dist/Nemorax.exe

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flet

      - name: Build Android APK
        env:
          PYTHONPATH: src
          FLET_CLI_NO_RICH_OUTPUT: "1"
        run: flet build apk --module app.py --output dist/android --yes --no-rich-output

      - name: Rename APK
        run: |
          find dist/android -name "*.apk" -print -exec cp {} dist/Nemorax.apk \;

      - name: Upload Android release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Nemorax.apk

      - name: Upload Android artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: Nemorax-android
          path: dist/Nemorax.apk
