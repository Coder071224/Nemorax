name: Release Builds

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flet

      - name: Build Windows app
        env:
          PYTHONPATH: src
        run: flet build windows --module app.py --output dist/windows

      - name: Collect Windows executable
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path dist/windows -Recurse -Filter *.exe | Select-Object -First 1
          if (-not $exe) { throw "No Windows executable was produced." }
          Copy-Item $exe.FullName dist/Nemorax.exe -Force

      - name: Upload Windows release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Nemorax.exe

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flet

      - name: Build Android APK
        env:
          PYTHONPATH: src
        run: flet build apk --module app.py --output dist/android

      - name: Rename APK
        run: |
          find dist/android -name "*.apk" -print -exec cp {} dist/Nemorax.apk \;

      - name: Upload Android release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Nemorax.apk
