services:
  - type: web
    name: nemorax-backend
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn nemorax.backend.main:app --app-dir src --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: NEMORAX_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: BACKEND_HOST
        value: 0.0.0.0
      - key: BACKEND_PORT
        value: 10000
      - key: BACKEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_MODEL
        value: openai/gpt-oss-20b
      - key: LLM_FALLBACK_MODEL
        value: llama-3.1-8b-instant
      - key: LLM_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: LLM_API_KEY
        sync: false
      - key: LLM_TEMPERATURE
        value: 0.25
      - key: LLM_TOP_P
        value: 1.0
      - key: LLM_MAX_COMPLETION_TOKENS
        value: 900
      - key: LLM_REASONING_EFFORT
        value: medium
      - key: LLM_INCLUDE_REASONING
        value: false
      - key: LLM_STREAM
        value: true
      - key: LLM_SEED
        value: 7
      - key: LLM_PROMPT_KNOWLEDGE_CHARS
        value: 6000
      - key: REQUEST_TIMEOUT_SECONDS
        value: 180
      - key: HEALTH_TIMEOUT_SECONDS
        value: 4
  - type: web
    name: nemorax-web
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: python serve_web.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: NEMORAX_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: BACKEND_URL
        value: https://nemorax-backend.onrender.com
      - key: FLET_FORCE_WEB_SERVER
        value: true
      - key: FLET_SERVER_IP
        value: 0.0.0.0
